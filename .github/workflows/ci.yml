name: CI — Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Confirm build output exists
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build succeeded — dist/ folder created"
            ls -lh dist/
          else
            echo "❌ Build failed — dist/ not found"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: openreach-dist
          path: dist/
          retention-days: 7
